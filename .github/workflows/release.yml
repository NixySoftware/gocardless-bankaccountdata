name: Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: 'Bump version by semver keyword.'
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

jobs:
    release:
        name: Release
        uses: NixySoftware/.github/.github/workflows/release.yml@6d52bf8461acf503864543df09d7d89439960e0f # v0.4.0
        with:
            bump: ${{ inputs.bump }}
            bump-rust: true
            bump-typescript: false
            extract-version: 'rust'
        secrets:
            app-client-id: ${{ secrets.APP_ID }}
            app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
