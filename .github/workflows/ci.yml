        name: Commits
        uses: NixySoftware/.github/.github/workflows/commits.yml@6d52bf8461acf503864543df09d7d89439960e0f # v0.4.0

    rust:
        name: Rust
        uses: NixySoftware/.github/.github/workflows/rust.yml@6d52bf8461acf503864543df09d7d89439960e0f # v0.4.0

    typescript:
        name: TypeScript
        uses: NixySoftware/.github/.github/workflows/typescript.yml@6d52bf8461acf503864543df09d7d89439960e0f # v0.4.0
        with:
            enable-lint: false
            enable-test: false
