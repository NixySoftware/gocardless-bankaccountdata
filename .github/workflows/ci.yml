        uses: NixySoftware/.github/.github/workflows/rust.yml@d2eab9162b8786a1cccdc33b4725f3045e119927 # v0.5.1

    typescript:
        name: TypeScript
        uses: NixySoftware/.github/.github/workflows/typescript.yml@d2eab9162b8786a1cccdc33b4725f3045e119927 # v0.5.1
        with:
            enable-lint: false
            enable-test: false
